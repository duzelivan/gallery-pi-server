<!DOCTYPE html>
<html lang="hr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gallery Pi — Upload</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <nav class="navbar">
    <h1>Gallery Pi Server</h1>
    <div class="nav-links">
      <a href="index.html" class="active">Upload</a>
      <a href="timeline.html">Timeline</a>
      <a href="users.html">Korisnici</a>
      <button onclick="logout()" class="btn-logout">Odjava</button>
    </div>
  </nav>

  <div class="container">
    <!-- LOGIN SECTION -->
    <div id="loginSection" class="login-section">
      <h2>⚡ Prijava</h2>
      <form id="loginForm" onsubmit="login(event)">
        <div class="form-group">
          <label>Korisničko ime</label>
          <input type="text" id="username" placeholder="Unesi korisničko ime" required>
        </div>
        <div class="form-group">
          <label>Lozinka</label>
          <input type="password" id="password" placeholder="Unesi lozinku" required>
        </div>
        <button type="submit" class="btn-primary" style="width: 100%; margin-top: 10px;">Prijavi se →</button>
      </form>
    </div>

    <!-- UPLOAD SECTION -->
    <div id="uploadSection" class="hidden">
      <div class="dashboard-grid">
        <!-- Upload Card -->
        <div class="card upload-card">
          <h2>Upload slike</h2>
          <form id="uploadForm" onsubmit="uploadImage(event)">
            <div class="form-group">
              <label>Slika</label>
              <input type="file" id="imageFile" accept="image/*" required>
            </div>
            <div class="form-group">
              <label>Naslov</label>
              <input type="text" id="title" placeholder="npr. Ljetovanje 2026">
            </div>
            <div class="form-group">
              <label>Opis</label>
              <textarea id="description" placeholder="Kratak opis slike..."></textarea>
            </div>
            <div class="form-row">
              <div class="form-group">
                <label>Kategorija</label>
                <input type="text" id="category" placeholder="npr. Obitelj">
              </div>
              <div class="form-group">
                <label>Datum</label>
                <input type="date" id="dateTaken">
              </div>
            </div>
            <button type="submit" id="uploadBtn" class="btn-primary">⬆ Upload</button>
            <!-- Progress bar -->
            <div id="uploadProgress" class="upload-progress hidden">
              <div class="progress-track">
                <div class="progress-fill" id="progressFill"></div>
              </div>
              <span class="progress-text" id="progressText">0%</span>
            </div>
          </form>
          <div id="uploadResult" class="result"></div>
        </div>

        <!-- USB Status Card -->
        <div class="card status-card">
          <h2>USB Status</h2>
          <div id="usbStatus" class="usb-info">
            <p class="loading">Provjeravam...</p>
          </div>
          <div class="status-indicator">
            <div class="pulse-dot"></div>
            <span class="status-text">Server aktivan</span>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
  <script src="effects.js"></script>
</body>
</html>
