<!DOCTYPE html>
<html lang="hr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gallery - Korisnici</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <nav class="navbar">
    <h1>🖼️ Gallery</h1>
    <div class="nav-links">
      <a href="index.html">Upload</a>
      <a href="timeline.html">Timeline</a>
      <a href="users.html" class="active">Korisnici</a>
      <button onclick="logout()" class="btn-logout">Odjava</button>
    </div>
  </nav>

  <div class="container">
    <div id="adminSection" class="hidden">
      <div class="card">
        <h2>➕ Novi korisnik</h2>
        <form id="userForm" onsubmit="addUser(event)">
          <input type="text" id="newUsername" placeholder="Korisničko ime" required>
          <input type="password" id="newPassword" placeholder="Lozinka" required>
          <select id="newRole">
            <option value="user">Korisnik</option>
            <option value="admin">Administrator</option>
          </select>
          <button type="submit" class="btn-primary">Dodaj</button>
        </form>
      </div>

      <div class="card">
        <h2>👥 Lista korisnika</h2>
        <div id="usersList" class="users-list">
          <p>Učitavanje...</p>
        </div>
      </div>
    </div>

    <div id="noAccess" class="hidden">
      <p class="error">Samo administratori mogu vidjeti ovu stranicu.</p>
    </div>
  </div>

  <script src="app.js"></script>
  <script src="users.js"></script>
</body>
</html>
